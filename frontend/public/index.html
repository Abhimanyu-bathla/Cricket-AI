<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0e1a" />
    <meta name="description" content="MatchState AI — Real-time Cricket Decision Support System" />
    <title>MatchState AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; }
      body {
        background: #0a0e1a;
        color: #e8f4ff;
        font-family: 'Syne', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #splash {
        position: fixed;
        inset: 0;
        background: #0a0e1a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #splash.hide { opacity: 0; pointer-events: none; }
      .splash-logo { display: flex; align-items: center; gap: 12px; }
      .splash-icon {
        width: 48px; height: 48px;
        background: linear-gradient(135deg, #00d4aa, #0099ff);
        border-radius: 12px;
        display: flex; align-items: center; justify-content: center;
        font-size: 24px;
      }
      .splash-title { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; color: #e8f4ff; }
      .splash-title span { color: #00d4aa; }
      .splash-sub {
        font-family: 'JetBrains Mono', monospace;
        font-size: 12px; color: #4a6580;
        letter-spacing: 2px; text-transform: uppercase;
      }
      .splash-spinner {
        width: 36px; height: 36px;
        border: 2px solid #1e3a5f;
        border-top-color: #00d4aa;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="splash-logo">
        <div class="splash-icon">🏏</div>
        <div class="splash-title">Match<span>State</span> AI</div>
      </div>
      <div class="splash-sub">Real-time Decision Support</div>
      <div class="splash-spinner"></div>
    </div>

    <div id="root"></div>

    <script>
      window.addEventListener('load', function () {
        setTimeout(function () {
          var splash = document.getElementById('splash');
          if (splash) {
            splash.classList.add('hide');
            setTimeout(function () { splash.remove(); }, 400);
          }
        }, 600);
      });
    </script>
  </body>
</html>
